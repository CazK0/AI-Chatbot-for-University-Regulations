{% extends "base.html" %}

{% block title %}Page Not Found - University Regulations Chatbot{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 text-center">
        <div class="card">
            <div class="card-body py-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
                </div>
                <h1 class="display-4 text-primary">404</h1>
                <h3 class="mb-3">Page Not Found</h3>

                    Sorry, the page you're looking for doesn't exist or has been moved.
                </p>
                <div>
                    <a href="/" class="btn btn-primary me-2">
                        <i class="fas fa-home me-1"></i>Go Home

                    <a href="/about" class="btn btn-outline-secondary">
                        <i class="fas fa-info-circle me-1"></i>Learn More

            </div>
        </div>
    </div>
</div>
{% endblock %}
