{% extends "base.html" %}

{% block title %}Server Error - University Regulations Chatbot{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 text-center">
        <div class="card">
            <div class="card-body py-5">
                <div class="mb-4">
                    <i class="fas fa-server text-danger" style="font-size: 5rem;"></i>
                </div>
                <h1 class="display-4 text-danger">500</h1>
                <h3 class="mb-3">Internal Server Error</h3>
                <p class="lead text-muted mb-4">
                    Something went wrong on our end. Please try again later or contact support if the problem persists.
                </p>
                <div>
                    <a href="/" class="btn btn-primary me-2">
                        <i class="fas fa-home me-1"></i>Go Home
                    </a>
                    <button onclick="window.location.reload()" class="btn btn-outline-secondary">
                        <i class="fas fa-redo me-1"></i>Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
